name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web — typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `build` runs vue-tsc (typecheck) then vite build — catches type errors too.
      - run: npm run build --workspace apps/web
      - run: npm test --workspace apps/web

  api:
    name: api — build + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: furniture
          POSTGRES_PASSWORD: furniture
          POSTGRES_DB: furniture_pos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U furniture"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL_TEST: postgresql://furniture:furniture@localhost:5432/furniture_pos_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate --workspace apps/api
      # `build` is tsc — a plugin/type regression fails here.
      - run: npm run build --workspace apps/api
      # vitest's global setup runs `prisma migrate deploy` against the service.
      - run: npm test --workspace apps/api

  docker-smoke:
    name: docker — build image + boot to /health
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: furniture
          POSTGRES_PASSWORD: furniture
          POSTGRES_DB: furniture_pos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U furniture"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      # Build the *exact* image Render builds, so dependency hoisting and
      # plugin/Fastify version mismatches surface here instead of in prod.
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t furniture-api:smoke .

      # Run the real container CMD (migrate deploy → seed → server) against the
      # Postgres service. --network host lets it reach the mapped service port.
      - name: Boot container
        run: |
          docker run -d --name api-smoke --network host \
            -e DATABASE_URL=postgresql://furniture:furniture@localhost:5432/furniture_pos \
            -e PORT=3000 \
            -e NODE_ENV=production \
            -e SEED_ADMIN_USERNAME=admin \
            -e SEED_ADMIN_PASSWORD=ci_smoke_password \
            furniture-api:smoke

      - name: Wait for /health
        run: |
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:3000/health | grep -q '"status":"ok"'; then
              echo "API is healthy after ${i} attempt(s)."
              exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become healthy within ~90s"
          exit 1

      - name: Container logs
        if: always()
        run: docker logs api-smoke || true
