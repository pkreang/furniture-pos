<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furniture House POS — Multi-Branch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=22">
</head>
<body>
  <!-- LOGIN OVERLAY -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <div class="login-logo">🛋️</div>
      <h1 class="login-title" id="login-title">Furniture House</h1>
      <p class="login-sub" id="login-subtitle">Multi-Branch POS System</p>

      <div style="text-align:right;margin-bottom:8px">
        <button id="btn-language-login" style="background:none;border:1px solid #e2e8f0;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;color:#6b7280">TH / EN</button>
      </div>

      <div class="login-form">
        <div class="form-group">
          <label class="form-label" id="lbl-username">Username</label>
          <input type="text" class="form-input" id="login-user" placeholder="owner, admin, cashier1...">
        </div>
        <div class="form-group">
          <label class="form-label" id="lbl-password">Password</label>
          <input type="password" class="form-input" id="login-pass" placeholder="•••••" value="1234">
        </div>
        <button class="btn-login" id="btn-login">🔓 <span id="lbl-login-btn">เข้าสู่ระบบ</span></button>
        <div class="login-error" id="login-error" style="display:none">❌ <span id="lbl-login-error">Username หรือ Password ไม่ถูกต้อง</span></div>
      </div>

      <div class="login-demo">
        <div class="login-demo-title" id="lbl-demo-title">ทดลองด้วย Demo Account (password: <b>1234</b>)</div>
        <div class="login-demo-grid">
          <button class="demo-user" data-user="owner">👑 owner</button>
          <button class="demo-user" data-user="admin">⭐ admin</button>
          <button class="demo-user" data-user="siam_mgr">🏢 siam_mgr</button>
          <button class="demo-user" data-user="cashier1">💰 cashier1</button>
          <button class="demo-user" data-user="account">📊 account</button>
        </div>
      </div>
    </div>
  </div>

  <div class="app" id="app-container" style="display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <h1>🛋️ <span id="logo-name">Furniture House</span></h1>
        <p id="logo-subtitle">Multi-Branch POS System</p>
      </div>

      <!-- Branch Selector -->
      <div class="branch-selector" id="branch-selector">
        <label id="lbl-branch-current">สาขาที่ใช้งาน ▾</label>
        <div class="branch-name" id="branch-name">…</div>
        <div class="branch-code" id="branch-code"></div>
      </div>

      <!-- Branch Dropdown (rendered dynamically) -->
      <div class="branch-dropdown" id="branch-dropdown"></div>

      <div id="nav-container"></div>

      <div class="user-card" id="user-card">
        <div class="user-avatar" id="user-avatar"></div>
        <div class="user-info">
          <div class="user-name" id="user-name"></div>
          <div class="user-role" id="user-role"></div>
        </div>
        <button class="user-logout" id="btn-language" title="Switch language" style="font-weight:700;font-size:11px">TH</button>
        <button class="user-logout" id="btn-darkmode" title="Toggle dark mode">🌙</button>
        <button class="user-logout" id="btn-logout" title="Logout">🚪</button>
      </div>

      <div class="sidebar-footer">
        Furniture House POS v1.0<br>
        <span id="sidebar-date"></span>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">
      <div class="topbar">
        <div>
          <div class="topbar-title" id="topbar-title">Dashboard</div>
          <div class="topbar-sub" id="topbar-sub"></div>
        </div>
        <div class="topbar-right">
          <span class="badge badge-green">● ออนไลน์</span>
          <div id="topbar-time" style="font-size:13px;color:#6b7280;font-weight:600"></div>
        </div>
      </div>

      <div class="content" id="main-content">
        <!-- Content renders here -->
      </div>
    </main>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="data.js?v=21"></script>
  <script src="app.js?v=21"></script>
  <script>
    // Clock in topbar
    function updateClock() {
      const el = document.getElementById("topbar-time");
      if (el) el.textContent = new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit", second: "2-digit" });

      const sideDate = document.getElementById("sidebar-date");
      if (sideDate) sideDate.textContent = new Date().toLocaleDateString("th-TH", { year: "numeric", month: "long", day: "numeric" });
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
